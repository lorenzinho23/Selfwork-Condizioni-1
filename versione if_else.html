<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Selfwork Condizioni 1</title>
  </head>
  <body>
    <h1>Hey, Ciao Mondo!</h1>

    <script>
      let v = 21;

      if (v < 18) {
        console.log("Insufficiente");
      } else if (v >= 18 && v < 21) {
        console.log("Sufficiente");
      } else if (v >= 21 && v < 24) {
        console.log("Buono");
      } else if (v >= 24 && v < 27) {
        console.log("Distinto");
      } else if (v >= 27 && v <= 29) {
        console.log("Ottimo");
      } else if (v === 30) {
        console.log("Eccellente");
      }
    </script>
  </body>
</html>
